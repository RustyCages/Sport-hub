<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Content-Security-Policy" content="connect-src *;"
<title>Hammarby IF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0a0a; --dark:#0d120d; --card:#141a14; --card2:#1a221a;
  --border:#1f2e1f; --green:#00a650; --green-d:#007a3d;
  --green-bg:rgba(0,166,80,0.10); --text:#e8e8e8; --muted:#666;
  --accent-light:#4cd98a; --red:#e63946; --blue:#6bc5ff;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--black); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

/* HEADER */
header {
  background:var(--dark); border-bottom:2px solid var(--green);
  height:52px; padding:0 16px;
  display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:200;
}
#header-badge { width:32px; height:32px; object-fit:contain; display:block; filter:drop-shadow(0 1px 4px rgba(0,0,0,.6)); }
.logo { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:#fff; letter-spacing:2px; line-height:1; white-space:nowrap; }
.logo span { color:#fff; opacity:.4; font-size:.9rem; margin:0 2px; }
.refresh-ind { margin-left:auto; font-size:.63rem; color:#fff; opacity:.6; display:flex; align-items:center; gap:5px; white-space:nowrap; }
.refresh-ind .dot { width:6px; height:6px; border-radius:50%; background:var(--accent-light); animation:blink 2s infinite; flex-shrink:0; }

/* TICKER */
.ticker { height:24px; background:var(--green); display:flex; overflow:hidden; }
.ticker-lbl { background:var(--black); color:var(--green); font-family:'Bebas Neue',sans-serif; font-size:.85rem; letter-spacing:1px; padding:0 12px; display:flex; align-items:center; flex-shrink:0; gap:5px; }
.ldot { width:7px; height:7px; border-radius:50%; background:var(--red); animation:blink 1.4s infinite; }
.ticker-scroll { overflow:hidden; flex:1; display:flex; align-items:center; }
.ticker-track { display:flex; white-space:nowrap; animation:tickScroll 42s linear infinite; color:var(--black); font-size:.75rem; font-weight:700; }
.t-item { padding:0 28px; }
@keyframes tickScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* LAYOUT */
.shell { max-width:1280px; margin:0 auto; display:grid; grid-template-columns:1fr 330px; }
.main { padding:16px 16px 60px; border-right:1px solid var(--border); min-width:0; }
.sidebar { padding:16px 14px 60px; min-width:0; }

/* SPORT TABS */
.sport-tabs { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:16px; }
.sport-tab { flex:1; padding:12px 8px; background:var(--card); border:none; border-right:1px solid var(--border); color:var(--muted); font-family:'DM Sans',sans-serif; font-weight:700; font-size:.9rem; cursor:pointer; transition:all .14s; display:flex; align-items:center; justify-content:center; gap:7px; }
.sport-tab:last-child { border-right:none; }
.sport-tab.active { background:var(--green); color:#fff; }
.sport-tab:hover:not(.active) { background:var(--border); color:var(--text); }
.sport-sec { display:none; }
.sport-sec.active { display:block; }

/* SECTION HEADERS */
.sh { display:flex; align-items:center; gap:8px; margin:20px 0 10px; }
.sh:first-child { margin-top:0; }
.sh-title { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:1px; color:var(--green); }
.badge { font-size:.67rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; padding:2px 7px; border-radius:20px; }
.bg-green { background:#0a1f0f; color:var(--accent-light); border:1px solid #0f3a1f; }
.sh-right { margin-left:auto; font-size:.72rem; color:var(--muted); cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; padding:0; }
.sh-right:hover { color:var(--green); }

/* HERO */
.hero { background:linear-gradient(135deg,var(--card) 0%,#001a0a 100%); border:1px solid var(--green-d); border-radius:12px; padding:16px; margin-bottom:16px; }
.hero-lbl { font-family:'Bebas Neue',sans-serif; font-size:.78rem; letter-spacing:2px; color:var(--green); opacity:.65; margin-bottom:10px; }
.hero-teams { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.hero-team { text-align:center; flex:1; }
.hero-bwrap { width:52px; height:52px; margin:0 auto 6px; display:flex; align-items:center; justify-content:center; }
.hero-bwrap img { width:50px; height:50px; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
.hero-fb { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:800; }
.hero-name { font-size:.85rem; font-weight:700; }
.hero-vs { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--green-d); opacity:.8; }
.hero-score { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; color:var(--green); text-align:center; letter-spacing:4px; line-height:1; margin-bottom:4px; }
.hero-meta { font-size:.77rem; color:var(--muted); line-height:1.7; }
.hero-meta strong { color:var(--text); }
.countdown { display:flex; gap:7px; margin-top:12px; }
.cd { flex:1; text-align:center; border-radius:6px; padding:6px 4px; background:var(--green-bg); border:1px solid var(--green-d); }
.cd-n { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--green); line-height:1; }
.cd-l { font-size:.58rem; text-transform:uppercase; color:var(--muted); letter-spacing:.05em; }

/* MATCH CARDS */
.matches { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
.mc { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:11px 12px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; transition:border-color .14s; }
.mc.hif { border-left:3px solid var(--green); }
.mc.nxt { border-left:3px solid #1f2e1f; }
.mc.live-mc { border-left:3px solid var(--red); }
.mc:hover { border-color:#2a3a2a; }
.mc.hif:hover { border-color:var(--green-d); }
.t-side { display:flex; align-items:center; gap:7px; min-width:0; }
.t-side.away { flex-direction:row-reverse; text-align:right; }
.badge-img { width:26px; height:26px; object-fit:contain; flex-shrink:0; }
.badge-fb { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.58rem; font-weight:800; flex-shrink:0; }
.t-name { font-weight:600; font-size:.85rem; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.t-name.highlight { color:var(--green); }
.mc-mid { text-align:center; flex-shrink:0; }
.score { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:2px; line-height:1; }
.score.dim { font-size:.9rem; color:var(--muted); font-family:'DM Sans',sans-serif; }
.mc-date { font-size:.68rem; color:var(--muted); margin-top:2px; white-space:nowrap; }
.live-tag { color:var(--red); font-weight:700; animation:blink 1.4s infinite; }

/* EXPAND BUTTONS */
.expand-btn {
  width:100%; background:var(--card2); border:1px solid var(--border); border-radius:7px;
  padding:9px; color:var(--muted); font-size:.77rem; font-weight:700;
  cursor:pointer; text-align:center; transition:all .14s; margin-top:6px;
  font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px;
}
.expand-btn:hover { background:var(--border); color:var(--text); }

/* TABLE */
.tbl-wrap { margin-bottom:16px; }
.tbl-scroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:.82rem; }
thead tr { border-bottom:2px solid var(--green); }
th { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); padding:7px 5px; text-align:center; }
th:nth-child(2) { text-align:left; padding-left:6px; }
td { padding:6px 5px; text-align:center; border-bottom:1px solid #141e14; }
td:nth-child(2) { text-align:left; padding-left:6px; }
tr:last-child td { border-bottom:none; }
tr.ar td { background:var(--green-bg); }
tr.ar td:nth-child(2) { border-left:3px solid var(--green); padding-left:7px; }
tr:hover td { background:var(--card2); }
tr.ar:hover td { background:rgba(0,166,80,.12); }
.t-pos { color:var(--muted); font-size:.73rem; }
.t-pts { font-weight:700; }
.t-row { display:flex; align-items:center; gap:5px; }
.tbl-badge { width:20px; height:20px; object-fit:contain; flex-shrink:0; }
.tbl-badge-fb { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.46rem; font-weight:800; flex-shrink:0; }
.form-dots { display:flex; gap:2px; justify-content:center; }
.fd { width:13px; height:13px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.52rem; font-weight:800; }
.fd.W { background:var(--accent-light); color:#000; }
.fd.D { background:#555; color:var(--text); }
.fd.L { background:var(--red); color:#fff; }
.tbl-extra { display:none; }
.tbl-extra.open { display:table-row-group; }
.tbl-expand-btn {
  width:100%; background:var(--card2); border:1px solid var(--border); border-top:none;
  border-radius:0 0 8px 8px; padding:8px; color:var(--muted); font-size:.75rem; font-weight:700;
  cursor:pointer; font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:5px;
  transition:all .14s;
}
.tbl-expand-btn:hover { background:var(--border); color:var(--text); }

/* SPELSCHEMA */
.schedule-month { margin-bottom:16px; }
.month-lbl { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:1px; color:var(--muted); margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--border); }
.month-lbl.cur { color:var(--green); }
.sched-rows { display:flex; flex-direction:column; gap:5px; }
.sr {
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  padding:9px 10px; display:grid; grid-template-columns:46px 1fr auto 1fr auto;
  align-items:center; gap:6px; overflow:hidden;
}
.sr.hif-sr { border-left:3px solid var(--green); }
.sr.done-sr { opacity:.7; }
.sr:hover { border-color:#2a3a2a; }
.sr-date { font-size:.7rem; color:var(--muted); }
.sr-date strong { display:block; color:var(--text); font-size:.78rem; white-space:nowrap; }
.sr-home { display:flex; align-items:center; gap:5px; justify-content:flex-end; min-width:0; }
.sr-away { display:flex; align-items:center; gap:5px; min-width:0; }
.sr-tn { font-weight:600; font-size:.78rem; line-height:1.25; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.sr-tn.highlight { color:var(--green); }
.sr-score { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.25rem; letter-spacing:2px; line-height:1; white-space:nowrap; flex-shrink:0; }
.sr-score.upcoming { font-size:.75rem; color:var(--muted); font-family:'DM Sans',sans-serif; letter-spacing:0; }
.sr-comp { font-size:.58rem; color:var(--muted); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70px; flex-shrink:0; }
.sr-live { color:var(--red); font-weight:700; font-size:.7rem; animation:blink 1.4s infinite; }

/* SIDEBAR */
.sb-sticky { position:sticky; top:70px; }
.sb-head { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:1px; color:var(--green); border-bottom:1px solid var(--border); padding-bottom:8px; margin-bottom:4px; display:flex; align-items:center; gap:7px; }
.news-btn { margin-left:auto; background:none; border:none; color:var(--muted); font-size:.7rem; cursor:pointer; display:flex; align-items:center; gap:3px; font-family:'DM Sans',sans-serif; font-weight:600; }
.news-btn:hover { color:var(--green); }
.news-btn svg { transition:transform .5s; }
.news-btn.spin svg { transform:rotate(360deg); }
.ni { padding:11px 0; border-bottom:1px solid var(--border); }
.ni:last-child { border-bottom:none; }
.ni.clickable { cursor:pointer; }
.ni.clickable:hover .ni-title { color:var(--green); }
.ni-tag { font-size:.63rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--green); margin-bottom:3px; }
.ni-tag.gen { color:var(--muted); }
.ni-title { font-size:.85rem; font-weight:600; line-height:1.35; margin-bottom:3px; transition:color .14s; }
.ni-time { font-size:.68rem; color:var(--muted); }

/* LIVE PILL */
.live-pill { display:inline-flex; align-items:center; gap:5px; font-size:.67rem; font-weight:700; padding:3px 9px; border-radius:20px; margin-bottom:14px; background:#0a1f0f; color:var(--accent-light); border:1px solid #0f3a1f; }

/* SKELETON */
.skel { border-radius:4px; background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.sb { height:13px; margin-bottom:7px; }
.status-box { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; color:var(--muted); font-size:.85rem; margin-bottom:8px; }
.status-box.err { border-color:#3a1a1a; color:var(--red); }

@media(max-width:900px) { .shell{grid-template-columns:1fr;} .main{border-right:none;} .sb-sticky{position:static;} }
@media(max-width:480px) { .t-name{font-size:.76rem;} .score{font-size:1.3rem;} th,td{padding:5px 3px;font-size:.74rem;} }
</style>
</head>
<body>

<header>
  <img id="header-badge" src="https://r2.thesportsdb.com/images/media/team/logo/utdi8o1718138664.png/medium" alt="Hammarby IF">

</main>

        <div class="skel sb" style="width:38%"></div><div class="skel sb" style="width:92%"></div><div class="skel sb" style="width:75%;margin-bottom:12px"></div>

<script>
// ════════════════════════════════════════
// WEBVIEW-DETEKTION
// ════════════════════════════════════════
(function(){
  const ua = navigator.userAgent;
  // WhatsApp/Facebook/Instagram WebView saknar "Safari" i UA, eller har "FBAN"/"FBAV"/"WhatsApp"
  const isWebView = /WhatsApp|FBAN|FBAV|Instagram|Line\/|MicroMessenger/.test(ua)
    || ((/iPhone|iPad|iPod/.test(ua)) && !/Safari\//.test(ua));
  if(isWebView) {
    document.getElementById('webview-banner').style.display='block';
  }
})();
// ════════════════════════════════════════
const SDB      = 'https://www.thesportsdb.com/api/v1/json/123';
const HIF_ID   = '134731';   // Hammarby IF herr
const HIF_W_ID = '143520';   // Hammarby IF dam
const L_ALLSV  = '4347';     // Allsvenskan (herr)
const L_DAM    = '5209';     // Damallsvenskan
const REFRESH  = 60000;
const NEWS_KEY = localStorage.getItem('hif_newskey') || 'pub_98bd7427a5f646b5867f66cbe43d5703';

const BADGES = {};
const _cache = {};
const CACHE_MS = 55000;
const getC = k => { const e=_cache[k]; return e&&Date.now()-e.t<CACHE_MS?e.d:null; };
const setC = (k,d) => { _cache[k]={t:Date.now(),d}; };
const pad = n => String(n).padStart(2,'0');

// ════════════════════════════════════════
// TEAM COLORS
// ════════════════════════════════════════
const TC = {
  'Hammarby IF':{bg:'#00a650',tc:'#fff'},'Hammarby':{bg:'#00a650',tc:'#fff'},
  'AIK':{bg:'#ffe000',tc:'#000'},
  'Malmö FF':{bg:'#005bab',tc:'#fff'},'Malmö':{bg:'#005bab',tc:'#fff'},
  'Djurgårdens IF':{bg:'#004b87',tc:'#fff'},'Djurgården':{bg:'#004b87',tc:'#fff'},
  'IFK Göteborg':{bg:'#003399',tc:'#fff'},
  'IF Elfsborg':{bg:'#004b23',tc:'#fff'},
  'Kalmar FF':{bg:'#cc0000',tc:'#fff'},
  'IFK Norrköping':{bg:'#006ab3',tc:'#fff'},
  'IK Sirius':{bg:'#1a1a2a',tc:'#fff'},
  'BK Häcken':{bg:'#f5a623',tc:'#000'},
  'Mjällby AIF':{bg:'#003087',tc:'#fff'},
  'Halmstads BK':{bg:'#0033a0',tc:'#fff'},
  'Degerfors IF':{bg:'#cc0000',tc:'#fff'},
  'GAIS':{bg:'#006633',tc:'#fff'},
  'Örebro SK':{bg:'#002D62',tc:'#fff'},
  'IF Brommapojkarna':{bg:'#0047AB',tc:'#fff'},
};
const ftc = n => TC[n]||{bg:'#1f2e1f',tc:'#aaa'};
const a3  = n => n.replace(/^(IF|IFK|BK|IK|Djurgårdens?|Halmstads?|Malmö)\s+/,'').substring(0,3).toUpperCase();

function isHIF(n) {
  if(!n) return false;
  const l = n.toLowerCase();
  // Matcha Hammarby IF / Hammarby men INTE Helsingborgs IF, Hammarby Talang etc.
  return (l === 'hammarby if' || l === 'hammarby') ||
         (l.startsWith('hammarby') && !l.includes('talang') && !l.includes('women') && !l.includes('dam'));
}
function isHIFW(n) {
  if(!n) return false;
  const l = n.toLowerCase();

// Safari-kompatibel timeout helper
function fetchWithTimeout(url, opts={}, ms=10000) {
  const ctrl = new AbortController();
  const id = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {...opts, signal:ctrl.signal}).finally(()=>clearTimeout(id));
}

async function sdb(path, bust=false) {
  const url = SDB+path;
  if(!bust){ const c=getC(url); if(c) return c; }
  const r = await fetchWithTimeout(url, {mode:'cors', cache:'no-store'}, 12000);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  setC(url,d);
  return d;
}

// DATE HELPERS
// ════════════════════════════════════════
const MONTHS = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
const DAYS   = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
function fmtDate(dateStr, timeStr='') {
  if(!dateStr) return '';
  const d = new Date(dateStr+'T'+(timeStr||'12:00:00'));
  return d.toLocaleDateString('sv-SE',{weekday:'short',day:'numeric',month:'short'})
    +(timeStr&&timeStr!=='00:00:00' ? ' '+timeStr.substring(0,5) : '');
}
function isFuture(d){ return d && new Date(d)>new Date(); }
function relativeTime(s) {
  if(!s) return '';
  const d=new Date(s); if(isNaN(d)) return '';
  const diff=Date.now()-d.getTime(), m=Math.floor(diff/60000);
  if(m<2) return 'Just nu';
  if(m<60) return `${m} min sedan`;
  const h=Math.floor(m/60);
  if(h<24) return `${h} tim sedan`;
  const day=Math.floor(h/24);
  if(day===1) return 'Igår';
  return d.toLocaleDateString('sv-SE',{day:'numeric',month:'short'});
}

// COUNTDOWN
// ════════════════════════════════════════
const _cdi={};
function startCd(iso, ids) {
  if(_cdi[ids[0]]) clearInterval(_cdi[ids[0]]);
  const tick=()=>{
    const diff=new Date(iso)-new Date();
    if(diff<=0){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='00';});return;}
    const v=[Math.floor(diff/864e5),Math.floor((diff%864e5)/36e5),Math.floor((diff%36e5)/6e4),Math.floor((diff%6e4)/1e3)];
    ids.forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=pad(v[i]);});
  };
  tick(); _cdi[ids[0]]=setInterval(tick,1000);
}

function scheduleRow(ev) {
  const home=ev.strHomeTeam||'', away=ev.strAwayTeam||'';
  const hB=ev.strHomeTeamBadge||BADGES[home]||'', aB=ev.strAwayTeamBadge||BADGES[away]||'';

  const homeHIF=isHIF(home), awayHIF=isHIF(away);
  const isTeam=homeHIF||awayHIF;
  const done=ev.strStatus==='Match Finished'||(ev.intHomeScore!=null&&ev.intHomeScore!==''&&!isFuture(ev.dateEvent));
  const live=ev.strStatus==='In Progress';
  const dt=new Date((ev.dateEvent||'2000-01-01')+'T'+(ev.strTime||'12:00:00'));
  const time=ev.strTime?ev.strTime.substring(0,5):'';
  const dH=homeHIF?'Hammarby':home, dA=awayHIF?'Hammarby':away;
  const comp=(ev.strLeague||'').replace('Swedish ','');
  const scoreHtml=live?`<div class="sr-score"><span class="sr-live">● LIVE</span></div>`:done?`<div class="sr-score">${ev.intHomeScore} – ${ev.intAwayScore}</div>`:`<div class="sr-score upcoming">${time||'–'}</div>`;
  return `<div class="sr ${isTeam?'hif-sr':''} ${done?'done-sr':''}">
    <div class="sr-date"><strong>${DAYS[dt.getDay()]} ${dt.getDate()}</strong></div>
    <div class="sr-home"><div class="sr-tn${homeHIF?' highlight':''}">${dH}</div>${badgeHtml(home,hB,20)}</div>
    ${scoreHtml}
    <div class="sr-away">${badgeHtml(away,aB,20)}<div class="sr-tn${awayHIF?' highlight':''}">${dA}</div></div>
    <div class="sr-comp">${comp}</div>
  </div>`;
}

function groupByMonth(events) {
  const g={};
  events.forEach(ev=>{
    const d=new Date((ev.dateEvent||'2000-01-01')+'T12:00:00');
    const k=`${d.getFullYear()}-${d.getMonth()}`;
    if(!g[k]) g[k]={lbl:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,m:d.getMonth(),y:d.getFullYear(),evs:[]};
    g[k].evs.push(ev);
  });
  return Object.values(g).sort((a,b)=>a.y!==b.y?a.y-b.y:a.m-b.m);
}

function renderScheduleHtml(events, showRows=5) {
  if(!events.length) return '<div class="status-box">Inga schemalagda matcher hittades.</div>';
  const now=new Date();
  const groups = groupByMonth(events);
  let rendered=0, html='', hiddenHtml='', inHidden=false;
  const uid = 'sched-fotboll-x';
  groups.forEach(g => {
    const cur=g.m===now.getMonth()&&g.y===now.getFullYear();
    const rows = g.evs.map(e => scheduleRow(e));
    if(rendered >= showRows && !inHidden) inHidden=true;
    const monthHtml = `<div class="schedule-month"><div class="month-lbl${cur?' cur':''}">${g.lbl}${cur?' · Nu':''}</div><div class="sched-rows">${rows.join('')}</div></div>`;
    if(!inHidden) html += monthHtml;
    else hiddenHtml += monthHtml;
    rendered += rows.length;
  });
  if(hiddenHtml) {
    html += `<div id="${uid}" style="display:none">${hiddenHtml}</div>
    <button class="expand-btn" onclick="toggleSched('${uid}',this)"><span>▼</span> Visa fler matcher</button>`;
  }
  return html;
}

    const [pD,nD,sD,sD2]=await Promise.all([
      sdb(`/eventslast.php?id=${HIF_ID}`,bust),
      sdb(`/eventsnext.php?id=${HIF_ID}`,bust),

      sdb(`/eventsseason.php?id=${HIF_ID}&s=2025-2026`,bust).catch(()=>({events:[]})),
    ]);
    const ALLOWED = ['allsvenskan','svenska cupen','swedish cup','swedish football cup'];
    const filter = evs => (evs||[]).filter(e => {
      const l = (e.strLeague||'').toLowerCase();
      return ALLOWED.some(k => l.includes(k));
    });
    // Slå ihop båda säsongssvararna och dedupa
    const combined = [...(sD.events||[]), ...(sD2.events||[])];
    const seen = new Set();
    const deduped = combined.filter(e => { const k=e.idEvent||e.dateEvent+e.strHomeTeam; if(seen.has(k)) return false; seen.add(k); return true; });
    const seasonEvs = filter(deduped);
    let evs;
    if(seasonEvs.length > 3) {
      evs = seasonEvs.sort((a,b)=>new Date(a.dateEvent)-new Date(b.dateEvent));
    } else {
      // Fallback: last + next, filtrera
      evs = [...filter(pD.results).reverse(), ...filter(nD.events)];
    }
    el.innerHTML=renderScheduleHtml(evs, 5);
  } catch(e){ el.innerHTML=`<div class="status-box err">Fel: ${e.message}</div>`; }
}

    if(m){const p=JSON.parse(m[0]);if((p.news||[]).length){feed.innerHTML=renderNewsItems(p.news);btn.classList.remove('spin');return;}}
  } catch {}

  // 3. Direktlänkar
  feed.innerHTML=`<div style="padding:4px 0;font-size:.8rem;color:var(--muted);margin-bottom:10px">Nyheter ej tillgängliga just nu.</div>
    <a href="https://www.svt.se/sport/fotboll" target="_blank" class="ni clickable"><div class="ni-tag gen">Allsvenskan</div><div class="ni-title">SVT Sport Fotboll →</div></a>
    <a href="https://www.fotbollskanalen.se/hammarby" target="_blank" class="ni clickable"><div class="ni-tag">Hammarby IF</div><div class="ni-title">Fotbollskanalen Hammarby →</div></a>
    <a href="https://www.hammarbyfotboll.se/nyheter" target="_blank" class="ni clickable"><div class="ni-tag">Hammarby IF</div><div class="ni-title">hammarbyfotboll.se Nyheter →</div></a>`;
  btn.classList.remove('spin');
}

async function loadDam(bust=false) {
  try {
    const [lastD, nextD] = await Promise.all([
      sdb(`/eventslast.php?id=${HIF_W_ID}`, bust),
      sdb(`/eventsnext.php?id=${HIF_W_ID}`, bust),
    ]);
    const all  = (lastD.results||[]).filter(e => isHIF(e.strHomeTeam)||isHIF(e.strAwayTeam)||isHIFW(e.strHomeTeam)||isHIFW(e.strAwayTeam));
    const next = (nextD.events ||[]).filter(e => isHIF(e.strHomeTeam)||isHIF(e.strAwayTeam)||isHIFW(e.strHomeTeam)||isHIFW(e.strAwayTeam));
    const live = next.find(e => e.strStatus==='In Progress');
    renderHero(live || next[0] || all[all.length-1], 'hero-dam');
  } catch(e) { console.warn('loadDam:', e.message); }
}

async function loadDamTable(bust=false) {
  const el=document.getElementById('tbl-dam');
  try {
    const d=await sdb(`/lookuptable.php?l=${L_DAM}&s=2026`,bust);
    const rows=d.table||[];
    if(!rows.length){el.innerHTML='<div class="status-box">Tabelldata saknas – säsongen har precis startat.</div>';return;}
    const hdrs='<th>#</th><th>Lag</th><th>M</th><th>V</th><th>O</th><th>F</th><th>GM</th><th>IM</th><th>+/-</th><th>P</th>';
    const rowsH=rows.map(t=>{
      if(t.strTeamBadge) BADGES[t.strTeam]=t.strTeamBadge;
      const hif=isHIF(t.strTeam)||isHIFW(t.strTeam), gf=parseInt(t.intGoalsFor)||0, ga=parseInt(t.intGoalsAgainst)||0;
      return `<tr class="${hif?'ar':''}"><td class="t-pos">${t.intRank||'–'}</td>
        <td><div class="t-row">${tblBadge(t.strTeam,t.strTeamBadge)}<span>${t.strTeam}${hif?' 🟢':''}</span></div></td>
        <td>${t.intPlayed||0}</td><td>${t.intWin||0}</td><td>${t.intDraw||0}</td><td>${t.intLoss||0}</td>
        <td>${gf}</td><td>${ga}</td><td>${gf-ga>0?'+':''}${gf-ga}</td><td class="t-pts">${t.intPoints||0}</td></tr>`;
    });
    renderTable('tbl-dam', hdrs, rowsH, 'tbl-dam-x', 3);
  } catch(e) { el.innerHTML=`<div class="status-box err">Tabellfel: ${e.message}</div>`; }
}

async function loadDamSchedule(bust=false) {
  const el=document.getElementById('schedule-dam');
  try {
    const [pD,nD,sD,sD2]=await Promise.all([
      sdb(`/eventslast.php?id=${HIF_W_ID}`,bust),
      sdb(`/eventsnext.php?id=${HIF_W_ID}`,bust),
      sdb(`/eventsseason.php?id=${HIF_W_ID}&s=2026`,bust).catch(()=>({events:[]})),
      sdb(`/eventsseason.php?id=${HIF_W_ID}&s=2025-2026`,bust).catch(()=>({events:[]})),
    ]);
    const ALLOWED = ['damallsvenskan','allsvenskan','svenska cupen','swedish cup'];
    const filter = evs => (evs||[]).filter(e => {
      const l = (e.strLeague||'').toLowerCase();
      return ALLOWED.some(k => l.includes(k));
    });
    const combined = [...(sD.events||[]), ...(sD2.events||[])];
    const seen = new Set();
    const deduped = combined.filter(e => { const k=e.idEvent||e.dateEvent+e.strHomeTeam; if(seen.has(k)) return false; seen.add(k); return true; });
    const seasonEvs = filter(deduped);
    let evs;
    if(seasonEvs.length > 3) {
      evs = seasonEvs.sort((a,b)=>new Date(a.dateEvent)-new Date(b.dateEvent));
    } else {
      evs = [...filter(pD.results).reverse(), ...filter(nD.events)];
    }
    el.innerHTML=renderScheduleHtml(evs, 5);
  } catch(e){ el.innerHTML=`<div class="status-box err">Fel: ${e.message}</div>`; }
}
