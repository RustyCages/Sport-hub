<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIK Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0a0a; --dark:#111; --card:#181818; --card2:#1f1f1f;
  --border:#2a2a2a; --gold:#FFD000; --gold-d:#c9a400;
  --gold-bg:rgba(255,208,0,0.10); --text:#e8e8e8; --muted:#666;
  --green:#2ec27e; --red:#e63946; --blue:#6bc5ff;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--black); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

/* HEADER */
header {
  background:var(--dark); border-bottom:2px solid var(--gold);
  height:52px; padding:0 16px;
  display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:200;
}
#header-badge { width:32px; height:32px; object-fit:contain; display:none; filter:drop-shadow(0 1px 4px rgba(0,0,0,.6)); }
.logo { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--gold); letter-spacing:2px; line-height:1; white-space:nowrap; }
.logo span { color:#fff; opacity:.4; font-size:.9rem; margin:0 2px; }
.refresh-ind { margin-left:auto; font-size:.63rem; color:var(--muted); display:flex; align-items:center; gap:5px; white-space:nowrap; }
.refresh-ind .dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 2s infinite; flex-shrink:0; }

/* TICKER */
.ticker { height:24px; background:var(--gold); display:flex; overflow:hidden; }
.ticker-lbl { background:var(--black); color:var(--gold); font-family:'Bebas Neue',sans-serif; font-size:.85rem; letter-spacing:1px; padding:0 12px; display:flex; align-items:center; flex-shrink:0; gap:5px; }
.ldot { width:7px; height:7px; border-radius:50%; background:var(--red); animation:blink 1.4s infinite; }
.ticker-scroll { overflow:hidden; flex:1; display:flex; align-items:center; }
.ticker-track { display:flex; white-space:nowrap; animation:tickScroll 42s linear infinite; color:var(--black); font-size:.75rem; font-weight:700; }
.t-item { padding:0 28px; }
@keyframes tickScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* LAYOUT */
.shell { max-width:1280px; margin:0 auto; display:grid; grid-template-columns:1fr 330px; }
.main { padding:16px 16px 60px; border-right:1px solid var(--border); min-width:0; }
.sidebar { padding:16px 14px 60px; min-width:0; }

/* SPORT TABS */
.sport-tabs { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:16px; }
.sport-tab { flex:1; padding:12px 8px; background:var(--card); border:none; border-right:1px solid var(--border); color:var(--muted); font-family:'DM Sans',sans-serif; font-weight:700; font-size:.9rem; cursor:pointer; transition:all .14s; display:flex; align-items:center; justify-content:center; gap:7px; }
.sport-tab:last-child { border-right:none; }
.sport-tab.active { background:var(--gold); color:#000; }
.sport-tab:hover:not(.active) { background:var(--border); color:var(--text); }

/* SECTION HEADERS */
.sh { display:flex; align-items:center; gap:8px; margin:20px 0 10px; }
.sh:first-child { margin-top:0; }
.sh-title { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:1px; color:var(--gold); }
.sh-title.blue { color:var(--blue); }
.badge { font-size:.67rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; padding:2px 7px; border-radius:20px; }
.bg-green { background:#1a2a1a; color:#4caf50; border:1px solid #2d4a2d; }
.bg-blue  { background:#0a1a2a; color:var(--blue); border:1px solid #0a3050; }
.bg-purple{ background:#1a1428; color:#bb86fc; border:1px solid #3a2a5a; }
.sh-right { margin-left:auto; font-size:.72rem; color:var(--muted); cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; padding:0; }
.sh-right:hover { color:var(--gold); }

/* HERO */
.hero { background:linear-gradient(135deg,var(--card) 0%,#1c1400 100%); border:1px solid var(--gold-d); border-radius:12px; padding:16px; margin-bottom:16px; }
.hero.bh { background:linear-gradient(135deg,var(--card) 0%,#001525 100%); border-color:#1a4060; }
.hero-lbl { font-family:'Bebas Neue',sans-serif; font-size:.78rem; letter-spacing:2px; color:var(--gold); opacity:.55; margin-bottom:10px; }
.hero.bh .hero-lbl { color:var(--blue); }
.hero-teams { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.hero-team { text-align:center; flex:1; }
.hero-bwrap { width:52px; height:52px; margin:0 auto 6px; display:flex; align-items:center; justify-content:center; }
.hero-bwrap img { width:50px; height:50px; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
.hero-fb { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:800; }
.hero-name { font-size:.85rem; font-weight:700; }
.hero-vs { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--gold-d); opacity:.7; }
.hero.bh .hero-vs { color:var(--blue); }
.hero-score { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; color:var(--gold); text-align:center; letter-spacing:4px; line-height:1; margin-bottom:4px; }
.hero-meta { font-size:.77rem; color:var(--muted); line-height:1.7; }
.hero-meta strong { color:var(--text); }
.countdown { display:flex; gap:7px; margin-top:12px; }
.cd { flex:1; text-align:center; border-radius:6px; padding:6px 4px; background:var(--gold-bg); border:1px solid var(--gold-d); }
.hero.bh .cd { background:rgba(107,197,255,.07); border-color:#1a4060; }
.cd-n { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--gold); line-height:1; }
.hero.bh .cd-n { color:var(--blue); }
.cd-l { font-size:.58rem; text-transform:uppercase; color:var(--muted); letter-spacing:.05em; }

/* MATCH CARDS */
.matches { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
.mc { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:11px 12px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; transition:border-color .14s; }
.mc.aik { border-left:3px solid var(--gold); }
.mc.nxt { border-left:3px solid #2a2a2a; }
.mc.live-mc { border-left:3px solid var(--red); }
.mc:hover { border-color:#444; }
.mc.aik:hover { border-color:var(--gold-d); }
.t-side { display:flex; align-items:center; gap:7px; min-width:0; }
.t-side.away { flex-direction:row-reverse; text-align:right; }
.badge-img { width:26px; height:26px; object-fit:contain; flex-shrink:0; }
.badge-fb { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.58rem; font-weight:800; flex-shrink:0; }
.t-name { font-weight:600; font-size:.85rem; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.t-name.gold { color:var(--gold); }
.mc-mid { text-align:center; flex-shrink:0; }
.score { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:2px; line-height:1; }
.score.dim { font-size:.9rem; color:var(--muted); font-family:'DM Sans',sans-serif; }
.mc-date { font-size:.68rem; color:var(--muted); margin-top:2px; white-space:nowrap; }
.live-tag { color:var(--red); font-weight:700; animation:blink 1.4s infinite; }

/* EXPAND BUTTONS */
.expand-btn {
  width:100%; background:var(--card2); border:1px solid var(--border); border-radius:7px;
  padding:9px; color:var(--muted); font-size:.77rem; font-weight:700;
  cursor:pointer; text-align:center; transition:all .14s; margin-top:6px;
  font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px;
}
.expand-btn:hover { background:var(--border); color:var(--text); }
.expand-extra { display:none; flex-direction:column; gap:7px; margin-top:6px; }
.expand-extra.open { display:flex; }

/* TABLE */
.tbl-wrap { margin-bottom:16px; }
.tbl-scroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:.82rem; }
thead tr { border-bottom:2px solid var(--gold); }
th { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); padding:7px 5px; text-align:center; }
th:nth-child(2) { text-align:left; padding-left:6px; }
td { padding:6px 5px; text-align:center; border-bottom:1px solid #1c1c1c; }
td:nth-child(2) { text-align:left; padding-left:6px; }
tr:last-child td { border-bottom:none; }
tr.ar td { background:var(--gold-bg); }
tr.ar td:nth-child(2) { border-left:3px solid var(--gold); padding-left:7px; }
tr:hover td { background:var(--card2); }
tr.ar:hover td { background:rgba(255,208,0,.12); }
.t-pos { color:var(--muted); font-size:.73rem; }
.t-pts { font-weight:700; }
.t-row { display:flex; align-items:center; gap:5px; }
.tbl-badge { width:17px; height:17px; object-fit:contain; flex-shrink:0; }
.tbl-badge-fb { width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.46rem; font-weight:800; flex-shrink:0; }
.form-dots { display:flex; gap:2px; justify-content:center; }
.fd { width:13px; height:13px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.52rem; font-weight:800; }
.fd.W { background:var(--green); color:#000; }
.fd.D { background:#555; color:var(--text); }
.fd.L { background:var(--red); color:#fff; }
/* Tabell expand */
.tbl-extra { display:none; }
.tbl-extra.open { display:table-row-group; }
.tbl-expand-btn {
  width:100%; background:var(--card2); border:1px solid var(--border); border-top:none;
  border-radius:0 0 8px 8px; padding:8px; color:var(--muted); font-size:.75rem; font-weight:700;
  cursor:pointer; font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:5px;
  transition:all .14s;
}
.tbl-expand-btn:hover { background:var(--border); color:var(--text); }

/* SPELSCHEMA */
.schedule-month { margin-bottom:16px; }
.month-lbl { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:1px; color:var(--muted); margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--border); }
.month-lbl.cur { color:var(--gold); }
.sched-rows { display:flex; flex-direction:column; gap:5px; }
.sr {
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  padding:9px 10px; display:grid; grid-template-columns:46px 1fr auto 1fr auto;
  align-items:center; gap:6px; overflow:hidden;
}
.sr.aik-sr { border-left:3px solid var(--gold); }
.sr.aik-sr.blue-sr { border-left-color:var(--blue); }
.sr.done-sr { opacity:.7; }
.sr:hover { border-color:#444; }
.sr-date { font-size:.7rem; color:var(--muted); }
.sr-date strong { display:block; color:var(--text); font-size:.78rem; white-space:nowrap; }
.sr-home { display:flex; align-items:center; gap:5px; justify-content:flex-end; min-width:0; }
.sr-away { display:flex; align-items:center; gap:5px; min-width:0; }
.sr-tn { font-weight:600; font-size:.78rem; line-height:1.25; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.sr-tn.gold { color:var(--gold); }
.sr-score { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.25rem; letter-spacing:2px; line-height:1; white-space:nowrap; flex-shrink:0; }
.sr-score.upcoming { font-size:.75rem; color:var(--muted); font-family:'DM Sans',sans-serif; letter-spacing:0; }
.sr-comp { font-size:.58rem; color:var(--muted); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70px; flex-shrink:0; }
.sr-live { color:var(--red); font-weight:700; font-size:.7rem; animation:blink 1.4s infinite; }

/* SIDEBAR */
.sb-sticky { position:sticky; top:70px; }
.sb-head { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:1px; color:var(--gold); border-bottom:1px solid var(--border); padding-bottom:8px; margin-bottom:4px; display:flex; align-items:center; gap:7px; }
.news-btn { margin-left:auto; background:none; border:none; color:var(--muted); font-size:.7rem; cursor:pointer; display:flex; align-items:center; gap:3px; font-family:'DM Sans',sans-serif; font-weight:600; }
.news-btn:hover { color:var(--gold); }
.news-btn svg { transition:transform .5s; }
.news-btn.spin svg { transform:rotate(360deg); }
.ni { padding:11px 0; border-bottom:1px solid var(--border); }
.ni:last-child { border-bottom:none; }
.ni.clickable { cursor:pointer; }
.ni.clickable:hover .ni-title { color:var(--gold); }
.ni-tag { font-size:.63rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--gold); margin-bottom:3px; }
.ni-tag.hock { color:var(--blue); }
.ni-tag.gen { color:var(--muted); }
.ni-title { font-size:.85rem; font-weight:600; line-height:1.35; margin-bottom:3px; transition:color .14s; }
.ni-time { font-size:.68rem; color:var(--muted); }

/* LIVE PILL */
.live-pill { display:inline-flex; align-items:center; gap:5px; font-size:.67rem; font-weight:700; padding:3px 9px; border-radius:20px; margin-bottom:14px; background:#0a1e0a; color:var(--green); border:1px solid #1a3a1a; }

/* SKELETON */
.skel { border-radius:4px; background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.sb { height:13px; margin-bottom:7px; }
.status-box { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; color:var(--muted); font-size:.85rem; margin-bottom:8px; }
.status-box.err { border-color:#3a1a1a; color:var(--red); }

.sport-sec { display:none; }
.sport-sec.active { display:block; }

@media(max-width:900px) { .shell{grid-template-columns:1fr;} .main{border-right:none;} .sb-sticky{position:static;} }
@media(max-width:480px) { .t-name{font-size:.76rem;} .score{font-size:1.3rem;} th,td{padding:5px 3px;font-size:.74rem;} }
</style>
</head>
<body>

<header>
  <img id="header-badge" src="" alt="AIK">
  <div class="logo">AIK<span>•</span>HUB</div>
  <div class="refresh-ind">
    <div class="dot"></div>
    <span id="refreshLabel">Auto-uppdatering</span>
  </div>
</header>

<div class="ticker">
  <div class="ticker-lbl"><div class="ldot"></div>SENASTE</div>
  <div class="ticker-scroll">
    <div class="ticker-track" id="tickerTrack">
      <span class="t-item">Laddar…</span><span class="t-item">Laddar…</span>
    </div>
  </div>
</div>

<div class="shell">
<main class="main">

  <div class="live-pill">● Live-data: TheSportsDB · Auto-refresh 60s</div>

  <div class="sport-tabs">
    <button class="sport-tab active" id="tab-fotboll" onclick="showSport('fotboll')">⚽ Fotboll</button>
    <button class="sport-tab" id="tab-hockey"  onclick="showSport('hockey')">🏒 Hockey</button>
  </div>

  <!-- FOTBOLL -->
  <div class="sport-sec active" id="sec-fotboll">
    <div id="hero-fotboll"></div>
    <div class="sh"><span class="sh-title">Tabell</span><span class="badge bg-green">Allsvenskan 2026</span><button class="sh-right" onclick="loadTable(true)">↻</button></div>
    <div class="tbl-wrap" id="tbl-allsv"><div class="status-box"><div class="skel sb" style="width:90%"></div><div class="skel sb" style="width:70%"></div></div></div>
    <div class="sh"><span class="sh-title">Spelschema</span><span class="badge bg-green">Alla tävlingar</span><button class="sh-right" onclick="loadSchedule(true)">↻</button></div>
    <div id="schedule-fotboll"><div class="status-box"><div class="skel sb" style="width:75%"></div></div></div>
  </div>

  <!-- HOCKEY -->
  <div class="sport-sec" id="sec-hockey">
    <div id="hero-hockey"></div>
    <div class="sh"><span class="sh-title blue">Tabell</span><span class="badge bg-blue">Hockeyallsvenskan 2025/26</span><button class="sh-right" onclick="loadHockeyTable(true)" style="color:var(--blue)">↻</button></div>
    <div class="tbl-wrap" id="tbl-hockey"><div class="status-box"><div class="skel sb" style="width:85%"></div></div></div>
    <div class="sh"><span class="sh-title blue">Spelschema</span><span class="badge bg-blue">Hockeyallsvenskan</span><button class="sh-right" onclick="loadHockeySchedule(true)" style="color:var(--blue)">↻</button></div>
    <div id="schedule-hockey"><div class="status-box"><div class="skel sb" style="width:70%"></div></div></div>
  </div>

</main>
<aside class="sidebar">
  <div class="sb-sticky">
    <div class="sb-head">
      <div class="ldot"></div>Nyheter
      <span style="font-size:.62rem;color:var(--muted);font-weight:500">NewsData · AI</span>
      <button class="news-btn" id="newsBtn" onclick="loadNews()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
        </svg>Uppdatera
      </button>
    </div>
    <div id="newsFeed">
      <div style="padding:10px 0">
        <div class="skel sb" style="width:45%"></div><div class="skel sb" style="width:88%"></div><div class="skel sb" style="width:70%;margin-bottom:12px"></div>
        <div class="skel sb" style="width:38%"></div><div class="skel sb" style="width:92%"></div><div class="skel sb" style="width:75%;margin-bottom:12px"></div>
        <div class="skel sb" style="width:52%"></div><div class="skel sb" style="width:82%"></div>
      </div>
    </div>
  </div>
</aside>
</div>

<script>
// ════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════
const SDB       = 'https://www.thesportsdb.com/api/v1/json/123';
const AIK_ID    = '134011';
const AIK_H_ID  = '137307';
const L_ALLSV   = '4347';
const L_HOCKEY  = '5162';
const REFRESH   = 60000;
const NEWS_KEY  = localStorage.getItem('aik_newskey') || 'pub_98bd7427a5f646b5867f66cbe43d5703';

const BADGES = {};
const _cache = {};
const CACHE_MS = 55000;
const getC = k => { const e=_cache[k]; return e&&Date.now()-e.t<CACHE_MS?e.d:null; };
const setC = (k,d) => { _cache[k]={t:Date.now(),d}; };
const pad = n => String(n).padStart(2,'0');

// ════════════════════════════════════════
// TEAM COLORS
// ════════════════════════════════════════
const TC = {
  'AIK':{bg:'#ffe000',tc:'#000'},
  'Malmö FF':{bg:'#005bab',tc:'#fff'},'Malmö':{bg:'#005bab',tc:'#fff'},
  'Djurgårdens IF':{bg:'#004b87',tc:'#fff'},'Djurgården':{bg:'#004b87',tc:'#fff'},
  'Hammarby IF':{bg:'#00a650',tc:'#fff'},'Hammarby':{bg:'#00a650',tc:'#fff'},
  'IFK Göteborg':{bg:'#003399',tc:'#fff'},
  'IF Elfsborg':{bg:'#004b23',tc:'#fff'},
  'Kalmar FF':{bg:'#cc0000',tc:'#fff'},
  'IFK Norrköping':{bg:'#006ab3',tc:'#fff'},
  'IK Sirius':{bg:'#1a1a2a',tc:'#fff'},
  'BK Häcken':{bg:'#f5a623',tc:'#000'},
  'Mjällby AIF':{bg:'#003087',tc:'#fff'},
  'Halmstads BK':{bg:'#0033a0',tc:'#fff'},
  'Degerfors IF':{bg:'#cc0000',tc:'#fff'},
  'Timrå IK':{bg:'#00205b',tc:'#fff'},
  'IF Björklöven':{bg:'#006633',tc:'#fff'},
  'Mora IK':{bg:'#cc0000',tc:'#fff'},
  'Vita Hästen':{bg:'#c0c0c0',tc:'#000'},
  'Karlskoga HK':{bg:'#cc0000',tc:'#fff'},
  'Västervik IK':{bg:'#003087',tc:'#fff'},
  'Almtuna IS':{bg:'#003087',tc:'#fff'},
  'Södertälje SK':{bg:'#003087',tc:'#fff'},
  'IK Oskarshamn':{bg:'#003087',tc:'#fff'},
  'Modo Hockey':{bg:'#cc0000',tc:'#fff'},
};
const ftc = n => TC[n]||{bg:'#2a2a2a',tc:'#aaa'};
const a3  = n => n.replace(/^(IF|IFK|BK|IK|Djurgårdens?|Halmstads?|Malmö)\s+/,'').substring(0,3).toUpperCase();

function badgeHtml(name, url, sz=26, hero=false) {
  const src = url || BADGES[name] || '';
  if(src) {
    if(hero) return `<div class="hero-bwrap"><img src="${src}" alt="${name}" loading="lazy" onerror="this.style.display='none'"></div>`;
    return `<img class="badge-img" src="${src}" alt="${name}" loading="lazy" style="width:${sz}px;height:${sz}px" onerror="this.style.display='none'">`;
  }
  const c = ftc(name);
  if(hero) return `<div class="hero-bwrap"><div class="hero-fb" style="background:${c.bg};color:${c.tc}">${a3(name)}</div></div>`;
  return `<div class="badge-fb" style="width:${sz}px;height:${sz}px;background:${c.bg};color:${c.tc}">${a3(name)}</div>`;
}
function tblBadge(name, url) {
  const src = url || BADGES[name] || '';
  if(src) return `<img class="tbl-badge" src="${src}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`;
  const c = ftc(name);
  return `<div class="tbl-badge-fb" style="background:${c.bg};color:${c.tc}">${name.substring(0,2).toUpperCase()}</div>`;
}

// API FETCH
// ════════════════════════════════════════
async function sdb(path, bust=false) {
  const url = SDB+path;
  if(!bust){ const c=getC(url); if(c) return c; }
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  setC(url,d);
  return d;
}

// ════════════════════════════════════════
// DATE HELPERS
// ════════════════════════════════════════
const MONTHS = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
const DAYS   = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
function fmtDate(dateStr, timeStr='') {
  if(!dateStr) return '';
  const d = new Date(dateStr+'T'+(timeStr||'12:00:00'));
  return d.toLocaleDateString('sv-SE',{weekday:'short',day:'numeric',month:'short'})
    +(timeStr&&timeStr!=='00:00:00' ? ' '+timeStr.substring(0,5) : '');
}
function isFuture(d){ return d && new Date(d)>new Date(); }
function relativeTime(s) {
  if(!s) return '';
  const d=new Date(s); if(isNaN(d)) return '';
  const diff=Date.now()-d.getTime(), m=Math.floor(diff/60000);
  if(m<2) return 'Just nu';
  if(m<60) return `${m} min sedan`;
  const h=Math.floor(m/60);
  if(h<24) return `${h} tim sedan`;
  const day=Math.floor(h/24);
  if(day===1) return 'Igår';
  return d.toLocaleDateString('sv-SE',{day:'numeric',month:'short'});
}

// ════════════════════════════════════════
// COUNTDOWN
// ════════════════════════════════════════
const _cdi={};
function startCd(iso, ids) {
  if(_cdi[ids[0]]) clearInterval(_cdi[ids[0]]);
  const tick=()=>{
    const diff=new Date(iso)-new Date();
    if(diff<=0){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='00';});return;}
    const v=[Math.floor(diff/864e5),Math.floor((diff%864e5)/36e5),Math.floor((diff%36e5)/6e4),Math.floor((diff%6e4)/1e3)];
    ids.forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=pad(v[i]);});
  };
  tick(); _cdi[ids[0]]=setInterval(tick,1000);
}

function matchCard(ev, accent='var(--gold)') {
  const home=ev.strHomeTeam||ev.home||'';
  const away=ev.strAwayTeam||ev.away||'';
  const hB=ev.strHomeTeamBadge||BADGES[home]||'';
  const aB=ev.strAwayTeamBadge||BADGES[away]||'';
  if(hB) BADGES[home]=hB; if(aB) BADGES[away]=aB;
  const homeAIK=home==='AIK'||home==='AIK IF';
  const awayAIK=away==='AIK'||away==='AIK IF';
  const isAIK=homeAIK||awayAIK;
  const done=ev.strStatus==='Match Finished'||(ev.intHomeScore!=null&&ev.intHomeScore!==''&&!isFuture(ev.dateEvent||ev.date));
  const live=ev.strStatus==='In Progress';
  const cls=live?'mc live-mc':isAIK?'mc aik':'mc nxt';
  const score=(done||live)?`<div class="score">${ev.intHomeScore??ev.hg??'–'} – ${ev.intAwayScore??ev.ag??'–'}</div>`:`<div class="score dim">vs</div>`;
  const meta=live?`<div class="mc-date"><span class="live-tag">● LIVE</span></div>`:`<div class="mc-date">${fmtDate(ev.dateEvent||ev.date,ev.strTime||ev.time)}</div>`;
  return `<div class="${cls}" style="${isAIK?`border-left-color:${accent}`:''}">
    <div class="t-side">${badgeHtml(home,hB)}<div class="t-name${homeAIK?' gold':''}">${homeAIK?'AIK':home}</div></div>
    <div class="mc-mid">${score}${meta}</div>
    <div class="t-side away">${badgeHtml(away,aB)}<div class="t-name${awayAIK?' gold':''}">${awayAIK?'AIK':away}</div></div>
  </div>`;
}

function scheduleRow(ev, isBlue=false) {
  const home=ev.strHomeTeam||'', away=ev.strAwayTeam||'';
  const hB=ev.strHomeTeamBadge||BADGES[home]||'', aB=ev.strAwayTeamBadge||BADGES[away]||'';
  if(hB) BADGES[home]=hB; if(aB) BADGES[away]=aB;
  const homeAIK=home==='AIK'||home==='AIK IF', awayAIK=away==='AIK'||away==='AIK IF';
  const isAIK=homeAIK||awayAIK;
  const done=ev.strStatus==='Match Finished'||(ev.intHomeScore!=null&&ev.intHomeScore!==''&&!isFuture(ev.dateEvent));
  const live=ev.strStatus==='In Progress';
  const dt=new Date((ev.dateEvent||'2000-01-01')+'T'+(ev.strTime||'12:00:00'));
  const time=ev.strTime?ev.strTime.substring(0,5):'';
  const dH=homeAIK?'AIK':home, dA=awayAIK?'AIK':away;
  const comp=(ev.strLeague||'').replace('Swedish ','').replace('HockeyAllsvenskan','HA');
  const scoreHtml=live?`<div class="sr-score"><span class="sr-live">● LIVE</span></div>`:done?`<div class="sr-score">${ev.intHomeScore} – ${ev.intAwayScore}</div>`:`<div class="sr-score upcoming">${time||'–'}</div>`;
  return `<div class="sr ${isAIK?'aik-sr':''} ${isBlue&&isAIK?'blue-sr':''} ${done?'done-sr':''}">
    <div class="sr-date"><strong>${DAYS[dt.getDay()]} ${dt.getDate()}</strong></div>
    <div class="sr-home"><div class="sr-tn${homeAIK?' gold':''}">${dH}</div>${badgeHtml(home,hB,20)}</div>
    ${scoreHtml}
    <div class="sr-away">${badgeHtml(away,aB,20)}<div class="sr-tn${awayAIK?' gold':''}">${dA}</div></div>
    <div class="sr-comp">${comp}</div>
  </div>`;
}

function groupByMonth(events) {
  const g={};
  events.forEach(ev=>{
    const d=new Date((ev.dateEvent||'2000-01-01')+'T12:00:00');
    const k=`${d.getFullYear()}-${d.getMonth()}`;
    if(!g[k]) g[k]={lbl:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,m:d.getMonth(),y:d.getFullYear(),evs:[]};
    g[k].evs.push(ev);
  });
  return Object.values(g).sort((a,b)=>a.y!==b.y?a.y-b.y:a.m-b.m);
}

function renderScheduleHtml(events, isBlue=false, showRows=5) {
  if(!events.length) return '<div class="status-box">Inga schemalagda matcher hittades.</div>';
  const now=new Date();
  // Dela upp i månadsgrupper
  const groups = groupByMonth(events);
  // Räkna totalt antal rader
  let rendered=0;
  let html='', hiddenHtml='', inHidden=false;
  const uid = isBlue ? 'sched-hockey-x' : 'sched-fotboll-x';

  groups.forEach(g => {
    const cur=g.m===now.getMonth()&&g.y===now.getFullYear();
    const rows = g.evs.map(e => scheduleRow(e,isBlue));

    if(rendered >= showRows && !inHidden) {
      // Börja dolda rader
      inHidden=true;
    }

    const monthHtml = `<div class="schedule-month"><div class="month-lbl${cur?' cur':''}">${g.lbl}${cur?' · Nu':''}</div><div class="sched-rows">${rows.join('')}</div></div>`;

    if(!inHidden) html += monthHtml;
    else hiddenHtml += monthHtml;

    rendered += rows.length;
  });

  if(hiddenHtml) {
    html += `<div id="${uid}" style="display:none">${hiddenHtml}</div>
    <button class="expand-btn" onclick="toggleSched('${uid}',this)"><span>▼</span> Visa fler matcher</button>`;
  }
  return html;
}

function toggleSched(id, btn) {
  const el=document.getElementById(id);
  const open = el.style.display==='none'||el.style.display==='';
  el.style.display = open ? 'block' : 'none';
  btn.innerHTML = open ? '<span>▲</span> Dölj' : '<span>▼</span> Visa fler matcher';
}

async function loadSchedule(bust=false) {
  const el=document.getElementById('schedule-fotboll');
  try {
    const [pD,nD,sD]=await Promise.all([
      sdb(`/eventslast.php?id=${AIK_ID}`,bust),
      sdb(`/eventsnext.php?id=${AIK_ID}`,bust),
      sdb(`/eventsseason.php?id=${AIK_ID}&s=2026`,bust).catch(()=>({events:[]})),
    ]);
    // Säsongsdata har fler matcher, annars fallback till last+next
    const seasonEvs = (sD.events||[]);
    let evs;
    if(seasonEvs.length > 5) {
      evs = seasonEvs.sort((a,b)=>new Date(a.dateEvent)-new Date(b.dateEvent));
    } else {
      evs = [...(pD.results||[]).reverse(), ...(nD.events||[])];
    }
    el.innerHTML=renderScheduleHtml(evs, false, 5);
  } catch(e){ el.innerHTML=`<div class="status-box err">Fel: ${e.message}</div>`; }
}

async function loadHockeySchedule(bust=false) {
  const el=document.getElementById('schedule-hockey');
  try {
    const [pD,nD,sD]=await Promise.all([
      sdb(`/eventslast.php?id=${AIK_H_ID}`,bust),
      sdb(`/eventsnext.php?id=${AIK_H_ID}`,bust),

    ]);
    const seasonEvs=(sD.events||[]).filter(isAIKH).map(normH);
    let evs;
    if(seasonEvs.length > 5) {
      evs = seasonEvs.sort((a,b)=>new Date(a.dateEvent)-new Date(b.dateEvent));
    } else {
      const past=(pD.results||[]).filter(isAIKH).map(normH).reverse();
      const next=(nD.events||[]).filter(isAIKH).map(normH);

// NEWS – NewsData.io + AI fallback
// ════════════════════════════════════════
function renderNewsItems(items) {
  const tagCls=t=>t.includes('Hockey')?'hock':(t==='Allsvenskan'||t==='Hockeyallsvenskan')?'gen':'';
  return items.map(item=>{
    const hasLink=!!item.url, safeUrl=(item.url||'').replace(/'/g,"\\'");
    const src=item.source?` · <span style="color:var(--muted)">${item.source}</span>`:'';
    return `<div class="ni${hasLink?' clickable':''}" ${hasLink?`onclick="window.open('${safeUrl}','_blank')"`:''}>
      <div class="ni-tag ${tagCls(item.tag)}">${item.tag}</div>
      <div class="ni-title">${item.title}</div>
      <div class="ni-time">${item.time||''}${src}${hasLink?' <span style="color:var(--gold-d)">→</span>':''}</div>
    </div>`;
  }).join('');
}

async function loadNews() {
  const feed=document.getElementById('newsFeed'), btn=document.getElementById('newsBtn');
  btn.classList.add('spin');
  feed.innerHTML='<div style="padding:10px 0">'+[1,2,3,4].map(()=>`<div style="margin-bottom:13px"><div class="skel sb" style="width:40%"></div><div class="skel sb" style="width:90%;height:15px"></div><div class="skel sb" style="width:55%"></div></div>`).join('')+'</div>';

  // 1. NewsData.io
  try {
    const queries=[{q:'AIK fotboll',tag:'AIK Fotboll'},{q:'AIK hockey',tag:'AIK Hockey'},{q:'Allsvenskan',tag:'Allsvenskan'},{q:'Hockeyallsvenskan',tag:'Hockeyallsvenskan'}];
    const all=[]; const seen=new Set();
    await Promise.allSettled(queries.map(async({q,tag})=>{
      const r=await fetch(`https://newsdata.io/api/1/latest?apikey=${NEWS_KEY}&q=${encodeURIComponent(q)}&language=sv&category=sports&size=5`,{signal:AbortSignal.timeout(9000)});
      const d=await r.json();
      if(d.status!=='success') return;
      (d.results||[]).forEach(a=>{
        if(!a.title||seen.has(a.title)) return;
        seen.add(a.title);
        all.push({tag,title:a.title,source:a.source_id||'',url:a.link||'',time:relativeTime(a.pubDate),rawDate:a.pubDate});
      });
    }));
    if(all.length){
      all.sort((a,b)=>new Date(b.rawDate||0)-new Date(a.rawDate||0));
      feed.innerHTML=renderNewsItems(all);
      btn.classList.remove('spin');
      return;
    }
  } catch {}

  // 2. Claude AI fallback
  try {
    const today=new Date().toLocaleDateString('sv-SE');
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:900,
      system:`Sportjournalist för AIK Stockholm. Skapa 8 trovärdiga nyhetsrubriker om AIK och svensk sport.
Svara ENBART med giltig JSON (inga kodblock): {"news":[{"tag":"AIK Fotboll"|"AIK Hockey"|"Allsvenskan"|"Hockeyallsvenskan","title":"rubrik","source":"SVT Sport"|"Fotbollskanalen"|"Expressen","url":"","time":"X tim sedan"}]}`,
      messages:[{role:'user',content:`AIK-nyheter ${today}`}]
    })});
    const d=await res.json();
    const txt=(d.content?.[0]?.text||'').replace(/```[a-z]*|```/g,'').trim();
    const m=txt.match(/\{[\s\S]*\}/);
    if(m){const p=JSON.parse(m[0]);if((p.news||[]).length){feed.innerHTML=renderNewsItems(p.news);btn.classList.remove('spin');return;}}
  } catch {}

  // 3. Direktlänkar
  feed.innerHTML=`<div style="padding:4px 0;font-size:.8rem;color:var(--muted);margin-bottom:10px">Nyheter ej tillgängliga just nu.</div>
    <a href="https://www.svt.se/sport/fotboll" target="_blank" class="ni clickable"><div class="ni-tag">Allsvenskan</div><div class="ni-title">SVT Sport Fotboll →</div></a>
    <a href="https://www.fotbollskanalen.se/aik" target="_blank" class="ni clickable"><div class="ni-tag">AIK Fotboll</div><div class="ni-title">Fotbollskanalen AIK →</div></a>
    <a href="https://www.aikfotboll.se/artiklar-och-nyheter" target="_blank" class="ni clickable"><div class="ni-tag">AIK Fotboll</div><div class="ni-title">AIK.se Nyheter →</div></a>`;
  btn.classList.remove('spin');
}
